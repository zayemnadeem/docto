<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="g1" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%" stop-color="#4ecdc4"/>
      <stop offset="100%" stop-color="#1a7a6e"/>
    </linearGradient>
    <linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6eddd6"/>
      <stop offset="100%" stop-color="#2a9d8f"/>
    </linearGradient>
  </defs>

  <!--
    The logo: a C-shaped teal ring (open gap on the right ~2 o'clock),
    a heartbeat/ECG line cutting across the circle horizontally,
    and a small stethoscope ring at the open end on the right.

    Circle center: (46, 50), radius: 36
    Ring thickness: ~10
    Gap: top-right, roughly from 340° to 20° (skipping ~40° arc)
  -->

  <!-- Main teal C-ring: full ring minus a gap at top-right  -->
  <!-- Draw as a thick-stroked arc from 20° going 320° around (clockwise) -->
  <!-- Arc from angle 20° to 340° (going the long way, 320°) -->
  <!--
    Start angle 20deg from x-axis = (cos20, sin20) from center (46,50)
    End angle 340deg               = (cos340, sin340)
    cos20 ≈ 0.940, sin20 ≈ 0.342  → point: (46+34*0.940, 50+34*0.342) = (78.0, 61.6)
    cos340≈ 0.940, sin340≈-0.342  → point: (46+34*0.940, 50-34*0.342) = (78.0, 38.4)
  -->
  <path
    d="M 78.0,61.6 A 34,34 0 1 1 78.0,38.4"
    fill="none"
    stroke="url(#g1)"
    stroke-width="10"
    stroke-linecap="round"
  />

  <!-- ECG / heartbeat line across the circle (slightly raised for visibility) -->
  <!-- Goes from left edge of ring ~(12,50) to the right gap start ~(75,50) -->
  <polyline
    points="12,50  26,50  31,40  36,60  43,30  50,62  56,50  75,50"
    fill="none"
    stroke="url(#g2)"
    stroke-width="4"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!-- Stethoscope: small ring at the open end of the C, to the right -->
  <!-- Center of small ring at ~(88, 50) -->
  <circle cx="88" cy="50" r="5.5" fill="none" stroke="#a8ddd8" stroke-width="2.5"/>
  <!-- tiny connector line from ring gap end to small circle -->
  <line x1="78" y1="50" x2="82.5" y2="50" stroke="#a8ddd8" stroke-width="2.5" stroke-linecap="round"/>
</svg>